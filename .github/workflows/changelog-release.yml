name: Changelog Release

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      # fetch-depth: 0 + fetch-tags: true so the Go ecosystem can read prior
      # vX.Y.Z tags when computing the next version, and so the action can diff
      # CHANGELOG.md.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false

      - uses: tempoxyz/changelogs@74f07b39c7c85773575e32472dfd5298ec6baaf4 # master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
